<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Archive — PayrollPH</title>
<link rel="stylesheet" href="../assets/css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
<style>
    /* Ensure the table can handle the checkbox column width */
    .card, .card-header { overflow: visible !important; }
    .checkbox-col { width: 45px; text-align: center; }
    #bulkActions { display: none; align-items: center; gap: 10px; margin-right: 15px; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">⬡</span>
    <div><div class="brand-name">PayrollPH</div><div class="brand-sub">Management System</div></div>
  </div>
  <nav class="sidebar-nav">
    <a href="../dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a href="employees.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M2 21v-1a7 7 0 0 1 14 0v1"/><circle cx="19" cy="11" r="3"/><path d="M22 21v-.5a3 3 0 0 0-3-3"/></svg>Employees</a>
    <a href="attendance.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><path d="m9 16 2 2 4-4"/></svg>Attendance</a>
    <a href="payroll.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Payroll</a>
    <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports</a>
    <div style="height: 1px; background: var(--border); margin: 12px 12px; opacity: 0.5;"></div>
    <a href="archive.html" class="nav-item active">
      <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>Deleted / Archive
    </a>
  </nav>
  <div class="sidebar-footer"><div class="db-badge"><span class="db-dot"></span>MySQL Connected</div></div>
</aside>

<main class="main">
    <header class="topbar">
        <div class="topbar-left">
            <h1 class="page-title">Deleted Records</h1>
            <span class="page-breadcrumb">Reports / Archive</span>
        </div>
    </header>

    <section class="content-grid" style="grid-template-columns: 1fr;">
        <div class="card card-wide">
            <div class="card-header">
                <h2>Archived Employees</h2>
                
                <div id="bulkActions">
                    <button class="btn-primary" style="background:var(--green); color:#111; padding:6px 12px; font-size:11px;" onclick="bulkRestore()">↻ Restore Selected</button>
                    <button class="btn-primary" style="background:var(--red); padding:6px 12px; font-size:11px;" onclick="bulkWipe()">✖ Wipe Selected</button>
                </div>

                <div class="card-actions">
                    <span style="font-size: 11px; color: var(--red);">Warning: Permanent wipe cannot be undone.</span>
                </div>
            </div>
            <div class="table-wrap">
                <table class="data-table" id="archiveTable">
                    <thead>
                        <tr>
                            <th class="checkbox-col"><input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)"></th>
                            <th>Code</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Position</th>
                            <th>Date Deleted</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="archiveBody">
                        <tr><td colspan="7" style="text-align: center; padding: 20px; color: var(--text3);">Loading archive...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<script src="../assets/js/archive.js"></script>
</body>
</html>
