<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payslips — PayrollPH</title>
<link rel="stylesheet" href="../assets/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <span class="brand-icon">⬡</span>
    <div><div class="brand-name">PayrollPH</div><div class="brand-sub">Management System</div></div>
  </div>
  <nav class="sidebar-nav">
    <a href="../index.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
    <a href="employees.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M2 21v-1a7 7 0 0 1 14 0v1"/></svg>Employees</a>
    <a href="attendance.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Attendance</a>
    <a href="payroll.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Payroll</a>
    <a href="payslips.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>Payslips</a>
    <a href="reports.html" class="nav-item"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports</a>
  </nav>
  <div class="sidebar-footer"><div class="db-badge"><span class="db-dot"></span>MySQL Connected</div></div>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">Payslips</h1>
      <span class="page-breadcrumb">Generated via <code style="color:var(--green);font-size:11px">CALL sp_generate_payslip(payroll_id)</code></span>
    </div>
    <div class="topbar-right">
      <select id="periodSel" class="period-selector" onchange="loadSlipList()">
        <option value="">-- Loading --</option>
      </select>
      <button class="btn-primary" onclick="genAll()">⚡ Generate All</button>
    </div>
  </header>

  <div style="display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start">

    <!-- Employee list -->
    <div class="card">
      <div class="card-header"><h2>Employees</h2></div>
      <ul id="slipList" style="list-style:none;padding:8px">
          <li style="padding:10px;text-align:center;color:var(--text3)">Loading...</li>
      </ul>
    </div>

    <!-- Payslip view -->
    <div id="slipView">
      <div class="card" style="padding:40px;text-align:center;color:var(--text3)">
        <div style="font-size:36px;margin-bottom:12px">📄</div>
        <div style="font-family:var(--font-head);font-size:15px">Select an employee to view payslip</div>
        <div style="font-size:12px;margin-top:8px">Payslip data is stored as JSON in the <code style="color:var(--green)">payslips.details_json</code> column</div>
      </div>
    </div>

  </div>
</main>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    await loadPeriods();
});

function fmt(n) { 
    return '₱ ' + Number(n).toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2}); 
}

function showToast(msg, color='green') {
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--${color});color:var(--${color});padding:12px 20px;border-radius:8px;font-family:var(--font-mono);font-size:12.5px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.4)`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// ==========================================
// API CALL: Load Periods Dropdown
// ==========================================
async function loadPeriods() {
    try {
        const response = await fetch('../api/payslips.php?action=periods');
        const result = await response.json();
        
        if (result.status === 'success') {
            const pSel = document.getElementById('periodSel');
            pSel.innerHTML = '<option value="">-- Select Period --</option>';
            result.data.forEach(p => { pSel.innerHTML += `<option value="${p}">${p}</option>`; });
            
            if (result.data.length > 0) {
                pSel.value = result.data[0];
                loadSlipList();
            }
        }
    } catch (error) {
        console.error("Error loading periods:", error);
    }
}

// ==========================================
// API CALL: Load Generated Payslips
// ==========================================
async function loadSlipList() {
    const period = document.getElementById('periodSel').value;
    const ul = document.getElementById('slipList');
    
    if (!period) {
        ul.innerHTML = '<li style="padding:10px;text-align:center;color:var(--text3)">Select a period</li>';
        return;
    }

    ul.innerHTML = '<li style="padding:10px;text-align:center;color:var(--text3)">Loading...</li>';
    
    try {
        const response = await fetch(`../api/payslips.php?action=list&period=${period}`);
        const result = await response.json();
        
        ul.innerHTML = '';
        
        if (result.status === 'success' && result.data.length > 0) {
            result.data.forEach(slip => {
                const p = slip.details.payroll;
                const li = document.createElement('li');
                li.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:9px 10px;border-radius:6px;cursor:pointer;margin-bottom:2px';
                li.onmouseover = () => li.style.background = 'var(--bg3)';
                li.onmouseout  = () => li.style.background = '';
                li.onclick     = () => showSlip(slip);
                li.innerHTML   = `
                  <div>
                    <div style="font-size:11.5px;font-weight:500;color:var(--text)">${slip.full_name}</div>
                    <div style="font-size:10px;color:var(--text3)">${slip.employee_code}</div>
                  </div>
                  <div style="text-align:right">
                    <div style="font-size:11px;color:var(--green)">${fmt(p.net_salary)}</div>
                    <div style="font-size:9px;color:var(--text3)">net</div>
                  </div>
                `;
                ul.appendChild(li);
            });
            
            // Automatically show the first slip
            showSlip(result.data[0]);
        } else {
            ul.innerHTML = '<li style="padding:10px;text-align:center;color:var(--text3)">No payslips generated for this period yet.</li>';
            document.getElementById('slipView').innerHTML = `
              <div class="card" style="padding:40px;text-align:center;color:var(--text3)">
                <div style="font-size:36px;margin-bottom:12px">📄</div>
                <div style="font-family:var(--font-head);font-size:15px">No Data Found</div>
                <div style="font-size:12px;margin-top:8px">Click "Generate All" to build the JSON snapshots for this period.</div>
              </div>
            `;
        }
    } catch (error) {
        console.error("Error loading payslips:", error);
    }
}

// ==========================================
// Render Selected Payslip
// ==========================================
function showSlip(slipData) {
  const e = slipData.details.employee;
  const p = slipData.details.payroll;
  const bonuses = slipData.details.bonuses || [];
  const deductions = slipData.details.deductions || [];

  const bonusRows = bonuses.map(b =>
    `<div class="payslip-line"><span>${b.type}</span><span class="amount">${fmt(b.amount)}</span></div>`
  ).join('');

  const dedRows = deductions.map(d =>
    `<div class="payslip-line"><span>${d.type}</span><span class="amount" style="color:var(--red)">(${fmt(d.amount)})</span></div>`
  ).join('');

  document.getElementById('slipView').innerHTML = `
    <div class="payslip-card" style="animation: fadeIn 0.3s ease;">
      <div class="payslip-header">
        <div>
          <div class="payslip-company">⬡ PayrollPH</div>
          <div class="payslip-period">Period: ${p.period_label} &nbsp;·&nbsp; Issue Date: ${new Date().toISOString().split('T')[0]}</div>
        </div>
        <div style="text-align:right">
          <div class="payslip-employee-name">${e.full_name}</div>
          <div class="payslip-position">${e.position} &nbsp;·&nbsp; ${e.department}</div>
          <div class="payslip-position">${e.employee_code} &nbsp;·&nbsp; ${e.employment_type}</div>
        </div>
      </div>

      <div class="payslip-section">
        <div class="payslip-section-title">Work Summary</div>
        <div class="payslip-line"><span>Days Worked</span><span class="amount">${p.total_days} days</span></div>
        <div class="payslip-line"><span>Regular Hours</span><span class="amount">${p.total_hours} hrs</span></div>
        <div class="payslip-line"><span>Overtime Hours</span><span class="amount" style="color:var(--gold)">${p.total_ot_hours} hrs</span></div>
      </div>

      <div class="payslip-section">
        <div class="payslip-section-title">Earnings</div>
        <div class="payslip-line"><span>Basic Pay</span><span class="amount">${fmt(p.basic_pay)}</span></div>
        ${p.total_ot_hours > 0 ? `<div class="payslip-line"><span>Overtime Pay (×1.25)</span><span class="amount" style="color:var(--gold)">${fmt(p.ot_pay)}</span></div>` : ''}
        ${bonusRows}
        <div class="payslip-line" style="font-weight:600; padding-top: 8px; border-top: 1px solid var(--border2); margin-top: 8px;">
            <span>Gross Salary</span><span class="amount" style="color:var(--text)">${fmt(p.gross_salary)}</span>
        </div>
      </div>

      <div class="payslip-section">
        <div class="payslip-section-title">Deductions</div>
        ${dedRows.length > 0 ? dedRows : '<div class="payslip-line" style="color:var(--text3);font-style:italic">No deductions</div>'}
      </div>

      <div class="payslip-total">
        <span>NET SALARY</span>
        <span class="net-amount">${fmt(p.net_salary)}</span>
      </div>

      <div style="margin-top:20px;padding-top:14px;border-top:1px dashed var(--border2);font-size:10.5px;color:var(--text3)">
        Stored in MySQL as: <code style="color:var(--green)">payslips.details_json JSON column</code>
        &nbsp;·&nbsp; Payslip ID: <code style="color:var(--green)">#${slipData.payslip_id}</code>
      </div>
    </div>
  `;
}

// ==========================================
// API CALL: Generate Payslips for Period
// ==========================================
async function genAll() {
    const period = document.getElementById('periodSel').value;
    if (!period) return alert("Select a period first!");
    
    if(!confirm(`Are you sure you want to generate/refresh all JSON payslips for ${period}?`)) return;

    showToast("Generating JSON payslips...", "blue");

    try {
        const response = await fetch('../api/payslips.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'generate_all', period: period })
        });
        
        const result = await response.json();
        if (result.status === 'success') {
            showToast(result.message, "green");
            loadSlipList(); // Reload the list to show the newly generated slips
        } else {
            showToast(result.message, "red");
        }
    } catch (error) {
        console.error("Error generating payslips:", error);
    }
}
</script>
</body>
</html>
