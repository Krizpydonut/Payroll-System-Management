<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="page-title">Employees</h1>
      <span class="page-breadcrumb">Employee Management</span>
    </div>
    <div class="topbar-right">
      <input type="text" class="search-box" placeholder="Search…" id="empSearch" oninput="filterEmployees()">
      <button class="btn-primary" onclick="openAddModal()">+ Add Employee</button>
    </div>
  </header>

  <div class="card">
    <div class="card-header">
      <h2>Employee Register <span id="empCount" style="color:var(--text3);font-size:12px"></span></h2>
      <div class="card-actions">
        <select id="deptFilter" class="period-selector" onchange="filterEmployees()">
          <option value="">All Departments</option>
        </select>
        <select id="statusFilter" class="period-selector" onchange="filterEmployees()">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Code</th><th>Name</th><th>Department</th><th>Position</th>
            <th>Type</th><th>Rate</th><th>Hired</th><th>Status</th><th style="text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="empBody">
           <tr><td colspan="9" style="text-align: center; padding: 20px; color: var(--text3);">Loading data...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-overlay" id="empModal" style="display:none">
  <div class="modal" style="max-width:600px">
    <div class="modal-title" id="empModalTitle" style="margin-bottom:20px">Add Employee</div>
    <div class="form-grid" style="padding:0">
      <div class="form-group"><label>First Name *</label><input id="fFirstName" placeholder="e.g. Maria" oninput="this.value = this.value.replace(/[^a-zA-Z\sñÑ]/g, '')"></div>
      <div class="form-group"><label>Last Name *</label><input id="fLastName" placeholder="e.g. Reyes" oninput="this.value = this.value.replace(/[^a-zA-Z\sñÑ]/g, '')"></div>
      <div class="form-group"><label>Middle Name</label><input id="fMiddleName" placeholder="optional" oninput="this.value = this.value.replace(/[^a-zA-Z\sñÑ]/g, '')"></div>
      <div class="form-group"><label>Gender *</label>
        <select id="fGender"><option value="">—</option><option>Male</option><option>Female</option><option>Other</option></select>
      </div>
      <div class="form-group"><label>Birthdate *</label><input id="fBirthdate" type="date"></div>
      <div class="form-group"><label>Email</label><input id="fEmail" type="email" placeholder="name@company.ph"></div>
      <div class="form-group"><label>Phone</label><input id="fPhone" type="text" maxlength="11" oninput="this.value = this.value.replace(/[^0-9]/g, '')" placeholder="09XX XXX XXXX"></div>
      <div class="form-group"><label>Date Hired *</label><input id="fHired" type="date"></div>
      <div class="form-group"><label>Department *</label><select id="fDept"></select></div>
      <div class="form-group"><label>Position *</label><select id="fPos"></select></div>
      <div class="form-group"><label>Employment Type *</label>
        <select id="fType"><option value="monthly">Monthly</option><option value="daily">Daily</option></select>
      </div>
      <div class="form-group"><label>Salary Rate *</label><input id="fRate" type="number" step="500" min="0" placeholder="e.g. 55000" oninput="this.value = this.value.replace(/[^0-9.]/g, '')"></div>
      <div class="form-group full"><label>Address</label><textarea id="fAddress" placeholder="City, Province" oninput="this.value = this.value.replace(/[^a-zA-Z\sñÑ]/g, '')"></textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn-outline" onclick="closeEmpModal()">Cancel</button>
      <button class="btn-primary" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<script src="../assets/js/employees.js"></script>
</body>
</html>
